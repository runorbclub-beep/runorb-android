    }
  }



  // applicationVariants are e.g. debug, release
  applicationVariants.all { variant ->
    variant.outputs.all { output ->
      //新增
      if (output.outputFile != null && output.outputFile.name.endsWith('.apk')) {
        def fileName = "runball_${variant.flavorName}_${variant.buildType.name}_${variant.versionName}_${releaseTime()}.apk"
        outputFileName = fileName
      }
    }

  }
}

dependencies {
  implementation fileTree(dir: "libs", include: ["*.jar"])
  //noinspection GradleDynamicVersion
  //implementation "com.facebook.react:react-native:+"  // From node_modules

  //各种模块
  implementation project(path: ':baseComm')
//    implementation project(path: ':blelib')
  implementation project(path: ':passlibrary')
  implementation project(path: ':circleprogress')
  implementation project(path: ':pickerview')
  implementation project(path: ':wheelview')
  implementation project(path: ':xrecyclerview')

  implementation project(path: ':module-bluetooth')
  implementation project(path: ':widget-progress')

  //google play不加入分享，因为会被拒绝
  if(!isGooglePlay.toBoolean()){
    implementation project(path: ':share')
