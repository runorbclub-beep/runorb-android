apply plugin: "com.android.application"

//新增gradle文件用来上传apk包到蒲公英
apply from: "../uploadApk.gradle"

def enableProguardInReleaseBuilds = false

static def releaseTime() {
  return new Date().format("yyyy-MM-dd", TimeZone.getTimeZone("UTC"))
}

android {
  //添加打包报错问题
  lintOptions {
    checkReleaseBuilds false
    abortOnError false
  }

  ndkVersion '22.0.7026061'
  buildToolsVersion rootProject.ext.buildToolsVersion
  compileSdkVersion rootProject.ext.compileSdkVersion

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  defaultConfig {
    applicationId rootProject.ext.applicationId.release
    namespace "com.cloud.runball"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    renderscriptTargetApi 19
    renderscriptSupportModeEnabled true

    versionCode rootProject.ext.versionCode
    versionName rootProject.ext.versionName
    //多dex
    multiDexEnabled true
    flavorDimensions "default"

    ndk {
      // 设置支持的SO库架构
      abiFilters 'armeabi' ,'arm64-v8a' //, 'x86_64', 'x86'  , 'armeabi-v7a' , 'arm64-v8a'
    }

    javaCompileOptions {
      annotationProcessorOptions {
        arguments = [
          moduleName: project.getName()
        ]
      }
    }

  }

  buildFeatures {
    buildConfig true
    viewBinding true
  }

  signingConfigs {
    debug {
      storeFile file(projectDir.path + '/release.jks')
      storePassword '123456'
      keyAlias 'key0'
      keyPassword '123456'
    }

    release {
      storeFile file('./release.jks')
      storePassword '123456'
      keyAlias 'key0'
      keyPassword '123456'
    }
  }

  //多渠道打包Build Variant = Build Type + Product Flavor
  buildTypes {
    debug {
//            buildConfigField "String", "CHINA_SERVER_URL", "\"${serverUrl.china}\""
//            buildConfigField "String", "CHINA_SERVER_URL", "\"${serverUrl.chinaTest}\""
      buildConfigField "boolean","isCityEnabled","${isCityEnabled.toBoolean()}"  //java代码中引用的定义形式
      signingConfig signingConfigs.debug
    }
    release {
//            buildConfigField "String", "CHINA_SERVER_URL", "\"${serverUrl.chinaTest}\""
//            buildConfigField "String", "CHINA_SERVER_URL", "\"${serverUrl.china}\""
      buildConfigField "boolean","isCityEnabled","${isCityEnabled.toBoolean()}"  //java代码中引用的定义形式
      // Caution! In production, you need to generate your own keystore file.
      // see https://reactnative.dev/docs/signed-apk-android.
      //携带签名
      signingConfig signingConfigs.release
      // 是否对代码混淆、压缩
      minifyEnabled enableProguardInReleaseBuilds
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
  }

  productFlavors{
    //应用宝、360手机助手、小米应用市场、华为应用市场、百度应用市场、googlepay市场、自动更新 cloud.runball.bazu.fileprovider  cloud.runball.bazu.fileprovider
    yingyongbao {
      buildConfigField "String", "CHINA_SERVER_URL", "\"${serverUrl.china}\""
      buildConfigField "String", "CHINA_SOCKET_URL", "\"${socketUrl.china}\""
      buildConfigField "String", "NATION_SERVER_URL", "\"${serverUrl.china}\""
      buildConfigField "String", "NATION_SOCKET_URL", "\"${socketUrl.china}\""
      applicationId rootProject.ext.applicationId.release
      manifestPlaceholders = [UMENG_CHANNEL_VALUE: "yingyongbao", qqappid:"","desc":"应用宝",PROVIDER_AUTHORITIES: "cloud.runball.bazu.fileprovider"]
    }
    xiaomi {
